<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>AR Cuaderno</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }

    #start-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #111; color: #fff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; gap: 24px; padding: 40px; text-align: center;
    }
    #start-screen h2 { font-size: 22px; font-weight: 700; }
    #start-screen p { font-size: 14px; color: #aaa; line-height: 1.7; }
    #start-btn {
      background: #f90; color: #000; border: none;
      padding: 18px 48px; border-radius: 40px;
      font-size: 18px; font-weight: 800; cursor: pointer;
    }

    #ar-container {
      display: none;
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    }

    #camera-feed {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    #ar-canvas {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 2;
    }

    #hint {
      position: fixed; bottom: 50px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75); color: #fff;
      padding: 12px 28px; border-radius: 30px;
      font-size: 14px; border: 1px solid rgba(255,165,0,0.6);
      white-space: nowrap; z-index: 100;
    }

    #status {
      position: fixed; top: 20px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6); color: #aaa;
      padding: 6px 16px; border-radius: 20px;
      font-size: 12px; z-index: 100;
      display: none;
    }
  </style>
</head>
<body>

<div id="start-screen">
  <h2>AR Cuaderno</h2>
  <p>Toca el boton, acepta<br>el permiso de camara y<br>apunta al cuaderno</p>
  <button id="start-btn" onclick="startAR()">ACTIVAR CAMARA</button>
</div>

<div id="ar-container">
  <video id="camera-feed" autoplay playsinline webkit-playsinline muted></video>
  <canvas id="ar-canvas"></canvas>
  <div id="hint">Apunta a la imagen del cuaderno</div>
  <div id="status">Cargando MindAR...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>

<script>
async function startAR() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('ar-container').style.display = 'block';
  document.getElementById('status').style.display = 'block';

  const cameraFeed = document.getElementById('camera-feed');
  const hint = document.getElementById('hint');
  const status = document.getElementById('status');

  try {
    // Step 1: get camera stream
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 1280 },
        height: { ideal: 720 }
      },
      audio: false
    });

    cameraFeed.srcObject = stream;
    await new Promise(resolve => {
      cameraFeed.onloadedmetadata = resolve;
    });
    await cameraFeed.play();

    status.textContent = 'Camara OK, cargando AR...';

    // Step 2: init MindAR
    const mindarController = new MINDAR.IMAGE.MindARThree({
      container: document.getElementById('ar-container'),
      imageTargetSrc: './targets.mind',
      maxTrack: 1,
      uiLoading: 'no',
      uiScanning: 'no',
      uiError: 'no',
    });

    const { renderer, scene, camera } = mindarController;

    // Step 3: create video plane to show on target
    const arVideo = document.createElement('video');
    arVideo.src = './video.mp4';
    arVideo.loop = true;
    arVideo.muted = true;
    arVideo.playsInline = true;
    arVideo.setAttribute('playsinline', '');
    arVideo.setAttribute('webkit-playsinline', '');
    arVideo.load();

    const texture = new THREE.VideoTexture(arVideo);
    const geometry = new THREE.PlaneGeometry(1, 0.5625);
    const material = new THREE.MeshBasicMaterial({ map: texture });
    const plane = new THREE.Mesh(geometry, material);

    const anchor = mindarController.addAnchor(0);
    anchor.group.add(plane);

    anchor.onTargetFound = () => {
      hint.style.display = 'none';
      status.style.display = 'none';
      arVideo.play().catch(() => {});
    };

    anchor.onTargetLost = () => {
      hint.style.display = 'block';
      arVideo.pause();
    };

    // Step 4: start
    await mindarController.start();
    status.textContent = 'Listo!';
    setTimeout(() => status.style.display = 'none', 2000);

    // Render loop
    renderer.setAnimationLoop(() => {
      renderer.render(scene, camera);
    });

  } catch(err) {
    document.getElementById('ar-container').innerHTML = `
      <div style="color:#fff;padding:40px;text-align:center;line-height:2">
        <p style="color:#f55;font-size:16px;font-weight:700">Error</p>
        <p>${err.message}</p>
        <br>
        <p>Ve a Configuracion > Safari > Camara > Permitir y recarga</p>
      </div>`;
  }
}
</script>

</body>
</html>
