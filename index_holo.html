<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #000; font-family: sans-serif; }
      #start-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #111; color: #fff;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 9999; gap: 24px; padding: 40px; text-align: center;
      }
      #start-screen h2 { font-size: 22px; font-weight: 700; }
      #start-screen p { font-size: 14px; color: #aaa; line-height: 1.7; }
      #start-btn {
        background: #f90; color: #000; border: none;
        padding: 18px 48px; border-radius: 40px;
        font-size: 18px; font-weight: 800; cursor: pointer;
      }
      #msg {
        position: fixed; bottom: 30px; left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.7); color: #fff;
        padding: 10px 24px; border-radius: 24px;
        font-size: 13px; z-index: 9999;
        display: none; text-align: center;
      }
      #hint2 {
        position: fixed; bottom: 70px; left: 50%;
        transform: translateX(-50%);
        color: rgba(255,153,0,0.8);
        font-size: 12px; z-index: 9999;
        display: none; text-align: center;
      }
    </style>
  </head>
  <body>

    <div id="start-screen">
      <h2>AR Cuaderno</h2>
      <p>Toca el boton y acepta<br>el permiso de camara</p>
      <button id="start-btn" onclick="startAR()">ACTIVAR CAMARA</button>
      <p id="error" style="color:#f55;font-size:13px;display:none"></p>
    </div>

    <div id="msg">Apunta a la imagen del cuaderno</div>
    <div id="hint2">Arrastra para rotar · Pellizca para zoom</div>

    <a-scene id="arscene"
      style="display:none"
      mindar-image="imageTargetSrc: ./targets.mind;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <video id="arVideo" src="./video.mp4"
          preload="auto" loop muted playsinline webkit-playsinline
          crossorigin="anonymous">
        </video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">

        <!-- Sombra debajo -->
        <a-plane
          position="0 -0.05 0.01"
          width="1.05" height="0.08"
          color="#000" opacity="0.35"
          rotation="-90 0 0">
        </a-plane>

        <!-- Marco brillante naranja/azul (efecto holograma) -->
        <a-plane
          position="0 0.25 0.09"
          width="1.06" height="0.585"
          color="#00cfff" opacity="0.18"
          rotation="-15 0 0">
        </a-plane>

        <!-- Borde exterior -->
        <a-plane
          position="0 0.25 0.08"
          width="1.08" height="0.6"
          color="#00cfff" opacity="0.08"
          rotation="-15 0 0">
        </a-plane>

        <!-- Video principal inclinado y elevado -->
        <a-video
          id="arPlane"
          src="#arVideo"
          position="0 0.25 0.1"
          width="1" height="0.5625"
          rotation="-15 0 0">
        </a-video>

        <!-- Lineas de base tipo holograma -->
        <a-plane
          position="0 -0.02 0.05"
          width="0.8" height="0.005"
          color="#00cfff" opacity="0.5"
          rotation="0 0 0">
        </a-plane>
        <a-plane
          position="0 -0.04 0.05"
          width="0.5" height="0.003"
          color="#00cfff" opacity="0.3"
          rotation="0 0 0">
        </a-plane>

      </a-entity>
    </a-scene>

    <script>
      AFRAME.registerComponent('touch-rotate', {
        init: function() {
          this.lastX = 0;
          this.lastY = 0;
          this.rotX = -15;
          this.rotY = 0;
          this.touching = false;
          this.lastDist = 0;
          this.scale = 1;
          const el = this.el;

          document.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
              this.touching = true;
              this.lastX = e.touches[0].clientX;
              this.lastY = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
              this.lastDist = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
              );
            }
          });

          document.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (e.touches.length === 1 && this.touching) {
              const dx = e.touches[0].clientX - this.lastX;
              const dy = e.touches[0].clientY - this.lastY;
              this.rotY += dx * 0.5;
              this.rotX -= dy * 0.5;
              this.lastX = e.touches[0].clientX;
              this.lastY = e.touches[0].clientY;
              el.setAttribute('rotation', `${this.rotX} ${this.rotY} 0`);
            } else if (e.touches.length === 2) {
              const dist = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
              );
              const delta = dist / this.lastDist;
              this.scale = Math.min(Math.max(this.scale * delta, 0.4), 4);
              el.setAttribute('scale', `${this.scale} ${this.scale} ${this.scale}`);
              this.lastDist = dist;
            }
          }, { passive: false });

          document.addEventListener('touchend', () => { this.touching = false; });
        }
      });

      async function startAR() {
        const errorEl = document.getElementById('error');
        const btn = document.getElementById('start-btn');
        btn.textContent = 'Abriendo camara...';
        btn.disabled = true;

        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: 'environment' } }, audio: false
          });
          stream.getTracks().forEach(t => t.stop());

          document.getElementById('start-screen').style.display = 'none';
          document.getElementById('msg').style.display = 'block';
          const scene = document.getElementById('arscene');
          scene.style.display = 'block';

          scene.addEventListener('loaded', () => {
            const target = document.querySelector('[mindar-image-target]');
            const video = document.getElementById('arVideo');
            const plane = document.getElementById('arPlane');
            plane.setAttribute('touch-rotate', '');

            target.addEventListener('targetFound', () => {
              document.getElementById('msg').style.display = 'none';
              document.getElementById('hint2').style.display = 'block';
              video.play().catch(() => {});
            });
            target.addEventListener('targetLost', () => {
              document.getElementById('msg').style.display = 'block';
              document.getElementById('hint2').style.display = 'none';
              video.pause();
            });
          });

        } catch(err) {
          btn.textContent = 'ACTIVAR CAMARA';
          btn.disabled = false;
          errorEl.style.display = 'block';
          errorEl.textContent = err.name === 'NotAllowedError'
            ? 'Permiso denegado. Ve a Configuracion > Safari > Camara > Permitir'
            : 'Error: ' + err.message;
        }
      }
    </script>

  </body>
</html>
