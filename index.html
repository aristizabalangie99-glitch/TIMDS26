<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #000; font-family: sans-serif; }

      #start-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #111; color: #fff;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 9999; gap: 24px; padding: 40px; text-align: center;
      }
      #start-screen h2 { font-size: 22px; font-weight: 700; }
      #start-screen p { font-size: 14px; color: #aaa; line-height: 1.7; }
      #start-btn {
        background: #f90; color: #000; border: none;
        padding: 18px 48px; border-radius: 40px;
        font-size: 18px; font-weight: 800; cursor: pointer;
      }
      #msg {
        position: fixed; bottom: 30px; left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.7); color: #fff;
        padding: 10px 24px; border-radius: 24px;
        font-size: 13px; z-index: 9999;
        display: none; text-align: center;
        font-family: sans-serif;
      }
    </style>
  </head>
  <body>

    <div id="start-screen">
      <h2>AR Cuaderno</h2>
      <p>Toca el boton y acepta<br>el permiso de camara</p>
      <button id="start-btn" onclick="startAR()">ACTIVAR CAMARA</button>
      <p id="error" style="color:#f55;font-size:13px;display:none"></p>
    </div>

    <div id="msg">Apunta a la imagen del cuaderno</div>

    <a-scene id="arscene"
      style="display:none"
      mindar-image="imageTargetSrc: ./targets.mind;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false">
      <a-assets>
        <video id="arVideo" src="./video.mp4"
          preload="auto" loop muted playsinline webkit-playsinline
          crossorigin="anonymous">
        </video>
      </a-assets>
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#arVideo" position="0 0 0.01" width="1" height="0.5625" rotation="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      async function startAR() {
        const errorEl = document.getElementById('error');
        const btn = document.getElementById('start-btn');
        btn.textContent = 'Abriendo camara...';
        btn.disabled = true;

        try {
          // Pedir camara explicitamente primero — esto hace que iOS muestre el popup de permiso
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: 'environment' } },
            audio: false
          });
          // Soltar el stream — A-Frame lo tomara despues
          stream.getTracks().forEach(t => t.stop());

          // Ahora mostrar A-Frame
          document.getElementById('start-screen').style.display = 'none';
          document.getElementById('msg').style.display = 'block';
          const scene = document.getElementById('arscene');
          scene.style.display = 'block';

          scene.addEventListener('loaded', () => {
            const target = document.querySelector('[mindar-image-target]');
            const video = document.getElementById('arVideo');
            target.addEventListener('targetFound', () => {
              document.getElementById('msg').style.display = 'none';
              video.play().catch(() => {});
            });
            target.addEventListener('targetLost', () => {
              document.getElementById('msg').style.display = 'block';
              video.pause();
            });
          });

        } catch(err) {
          btn.textContent = 'ACTIVAR CAMARA';
          btn.disabled = false;
          errorEl.style.display = 'block';
          if (err.name === 'NotAllowedError') {
            errorEl.textContent = 'Permiso de camara denegado. Ve a Configuracion > Safari > Camara > Permitir';
          } else {
            errorEl.textContent = 'Error: ' + err.message;
          }
        }
      }
    </script>

  </body>
</html>
