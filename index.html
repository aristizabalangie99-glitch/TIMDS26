<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>AR Cuaderno</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; width: 100vw; height: 100vh; font-family: sans-serif; }

    #start-screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: #111; color: #fff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; gap: 24px; padding: 40px; text-align: center;
    }
    #start-screen h2 { font-size: 20px; font-weight: 600; }
    #start-screen p { font-size: 14px; color: #aaa; line-height: 1.6; }
    #start-btn {
      background: #f90; color: #000; border: none;
      padding: 16px 40px; border-radius: 30px;
      font-size: 16px; font-weight: 700; cursor: pointer;
      margin-top: 8px;
    }

    #loading {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; color: #fff;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 999; gap: 20px; text-align: center; padding: 30px;
    }
    #loading h2 { font-size: 18px; }
    #loading p { font-size: 13px; color: #aaa; }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid #333; border-top-color: #f90;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #scan-hint {
      position: absolute; bottom: 50px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7); color: #fff;
      padding: 12px 24px; border-radius: 24px;
      font-size: 14px; z-index: 10; text-align: center;
      display: none; border: 1px solid rgba(255,165,0,0.5);
      white-space: nowrap;
    }

    #sound-btn {
      position: absolute; top: 20px; right: 20px;
      background: rgba(0,0,0,0.6); color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px; padding: 8px 16px;
      font-size: 13px; z-index: 10; display: none; cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- PANTALLA INICIAL: botón que el usuario toca para pedir cámara -->
  <div id="start-screen">
    <h2>AR Cuaderno</h2>
    <p>Toca el botón para activar<br>la cámara y ver el contenido<br>sobre el cuaderno</p>
    <button id="start-btn" onclick="startAR()">ACTIVAR CÁMARA</button>
    <p style="font-size:12px; color:#555;">Necesitas dar permiso de cámara cuando te lo pida</p>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <h2>Cargando AR...</h2>
    <p>Puede tardar unos segundos</p>
  </div>

  <div id="scan-hint">Apunta la cámara a la imagen del cuaderno</div>
  <button id="sound-btn" onclick="toggleSound()">Activar sonido</button>

  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <script>
    function startAR() {
      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('loading').style.display = 'flex';

      // Pedir permiso de cámara explícitamente primero
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(stream => {
          stream.getTracks().forEach(t => t.stop());
          loadScene();
        })
        .catch(err => {
          document.getElementById('loading').innerHTML =
            '<p style="color:#f55;padding:20px;text-align:center">No se pudo acceder a la cámara.<br><br>Ve a Configuración > Safari > Cámara > Permitir<br><br>Luego recarga la página.</p>';
        });
    }

    function loadScene() {
      const sceneEl = document.createElement('a-scene');
      sceneEl.setAttribute('mindar-image', 'imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no; uiError: no;');
      sceneEl.setAttribute('color-space', 'sRGB');
      sceneEl.setAttribute('renderer', 'colorManagement: true;');
      sceneEl.setAttribute('vr-mode-ui', 'enabled: false');
      sceneEl.setAttribute('device-orientation-permission-ui', 'enabled: false');

      sceneEl.innerHTML = `
        <a-assets timeout="30000">
          <video id="arVideo" src="./video.mp4"
            preload="auto" loop muted playsinline webkit-playsinline
            crossorigin="anonymous"></video>
        </a-assets>
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0">
          <a-video src="#arVideo" position="0 0 0.01" width="1" height="0.5625"></a-video>
        </a-entity>
      `;

      document.body.appendChild(sceneEl);

      sceneEl.addEventListener('loaded', () => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('scan-hint').style.display = 'block';
        document.getElementById('sound-btn').style.display = 'block';
      });

      setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('scan-hint').style.display = 'block';
      }, 10000);

      sceneEl.addEventListener('loaded', () => {
        const target = sceneEl.querySelector('[mindar-image-target]');
        const video = document.getElementById('arVideo');

        target.addEventListener('targetFound', () => {
          document.getElementById('scan-hint').style.display = 'none';
          video.play().catch(() => {});
        });

        target.addEventListener('targetLost', () => {
          document.getElementById('scan-hint').style.display = 'block';
          video.pause();
        });
      });
    }

    let soundOn = false;
    function toggleSound() {
      const video = document.getElementById('arVideo');
      if (!video) return;
      soundOn = !soundOn;
      video.muted = !soundOn;
      document.getElementById('sound-btn').textContent = soundOn ? 'Sonido ON' : 'Activar sonido';
      if (soundOn) video.play().catch(() => {});
    }
  </script>

</body>
</html>
