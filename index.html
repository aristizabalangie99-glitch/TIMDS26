<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AR Cuaderno</title>

  <!-- Librerías -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-three.prod.js"></script>

  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }

    #start-screen {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      gap: 20px;
      text-align: center;
    }

    #start-btn {
      padding: 15px 35px;
      background: orange;
      border: none;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
    }

    #ar-container {
      position: relative; /* 🔥 IMPORTANTE */
      width: 100vw;
      height: 100vh;
    }

    #hint {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
    }
  </style>
</head>

<body>

<div id="start-screen">
  <h2>AR Cuaderno</h2>
  <p>Toca iniciar y apunta a la imagen</p>
  <button onclick="startAR()">INICIAR</button>
</div>

<div id="ar-container"></div>
<div id="hint">Apunta a la imagen del cuaderno</div>

<script>
async function startAR() {

  document.getElementById('start-screen').style.display = 'none';

  const mindarThree = new window.MINDAR.IMAGE.MindARThree({
    container: document.getElementById('ar-container'),
    imageTargetSrc: './targets.mind',
  });

  const { renderer, scene, camera } = mindarThree;

  const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
  scene.add(light);

  // 🎥 Video
  const video = document.createElement('video');
  video.src = './video.mp4';
  video.loop = true;
  video.muted = true;
  video.playsInline = true;

  const texture = new THREE.VideoTexture(video);

  const geometry = new THREE.PlaneGeometry(1, 0.56);
  const material = new THREE.MeshBasicMaterial({ map: texture });
  const plane = new THREE.Mesh(geometry, material);

  const anchor = mindarThree.addAnchor(0);
  anchor.group.add(plane);

  anchor.onTargetFound = () => {
    document.getElementById('hint').style.display = 'none';
    video.play();
  };

  anchor.onTargetLost = () => {
    document.getElementById('hint').style.display = 'block';
    video.pause();
  };

  await mindarThree.start();

  // 🔥 FIX CÁMARA (LO QUE TE FALTABA)
  const camVideo = mindarThree.video;
  camVideo.setAttribute("playsinline", "");
  camVideo.muted = true;
  camVideo.play();

  renderer.setAnimationLoop(() => {
    renderer.render(scene, camera);
  });
}
</script>

</body>
</html>
