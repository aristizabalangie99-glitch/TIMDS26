<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body style="margin:0;overflow:hidden;">
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">

      <a-assets>
        <video id="arVideo" src="./video.mp4"
          preload="auto" loop muted playsinline webkit-playsinline
          crossorigin="anonymous">
        </video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#arVideo" position="0 0 0.01" width="1" height="0.5625" rotation="0 0 0"></a-video>
      </a-entity>

    </a-scene>

    <script>
      const scene = document.querySelector('a-scene');
      scene.addEventListener('loaded', () => {
        const target = document.querySelector('[mindar-image-target]');
        const video = document.getElementById('arVideo');
        target.addEventListener('targetFound', () => video.play().catch(() => {}));
        target.addEventListener('targetLost', () => video.pause());
      });
    </script>
  </body>
</html>
