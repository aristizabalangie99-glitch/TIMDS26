<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>AR Cuaderno</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: sans-serif; }

    #start-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #111; color: #fff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; gap: 24px; padding: 40px; text-align: center;
    }
    #start-screen h2 { font-size: 22px; font-weight: 700; }
    #start-screen p { font-size: 14px; color: #aaa; line-height: 1.7; }
    #start-btn {
      background: #f90; color: #000; border: none;
      padding: 18px 48px; border-radius: 40px;
      font-size: 18px; font-weight: 800; cursor: pointer;
    }

    #hint {
      position: fixed; bottom: 50px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75); color: #fff;
      padding: 12px 28px; border-radius: 30px;
      font-size: 14px; border: 1px solid rgba(255,165,0,0.6);
      white-space: nowrap; z-index: 9999;
      display: none;
    }
  </style>
</head>
<body>

<div id="start-screen">
  <h2>AR Cuaderno</h2>
  <p>Toca el boton, acepta<br>el permiso de camara y<br>apunta al cuaderno</p>
  <button id="start-btn" onclick="startAR()">ACTIVAR CAMARA</button>
</div>

<div id="hint">Apunta a la imagen del cuaderno</div>

<script src="./mindar.js"></script>
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<script>
function startAR() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('hint').style.display = 'block';

  const scene = document.createElement('a-scene');
  scene.setAttribute('mindar-image', 'imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no; uiError: no;');
  scene.setAttribute('color-space', 'sRGB');
  scene.setAttribute('renderer', 'colorManagement: true;');
  scene.setAttribute('vr-mode-ui', 'enabled: false');
  scene.setAttribute('device-orientation-permission-ui', 'enabled: false');

  scene.innerHTML = `
    <a-assets>
      <video id="arVideo" src="./video.mp4"
        preload="auto" loop muted playsinline webkit-playsinline
        crossorigin="anonymous"></video>
    </a-assets>
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-entity mindar-image-target="targetIndex: 0">
      <a-video src="#arVideo" position="0 0 0.01" width="1" height="0.5625" rotation="0 0 0"></a-video>
    </a-entity>
  `;

  document.body.appendChild(scene);

  scene.addEventListener('loaded', () => {
    const target = scene.querySelector('[mindar-image-target]');
    const video = document.getElementById('arVideo');

    target.addEventListener('targetFound', () => {
      document.getElementById('hint').style.display = 'none';
      video.play().catch(() => {});
    });

    target.addEventListener('targetLost', () => {
      document.getElementById('hint').style.display = 'block';
      video.pause();
    });
  });
}
</script>

</body>
</html>
